<!DOCTYPE html>
<html>
  <head>
      <title>Clase antes de vacaciones</title>
      <link rel="stylesheet" href="css/estilos.css">
      <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
      <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">


  </head>

  

  <body style="color:bisque;">
    <div id="contenedor">
      <div class="elemento"> Sección 1</div>
      <div class="elemento"> Sección 2</div>
        <div class="elemento"> Sección 3</div>
    </div> 

    <div id="encabezado" class="p-3 mb-2 bg-light text-dark">

      <button type="button" id="artista1" class="btn btn-lg btn-primary">Obtener cantante 1</button>
      <button type="button" id="artista2" class="btn btn-lg btn-primary">Obtener cantante 2</button>

      <p id="nombre" class="text-muted"></p>
      <p id="bibio" class="text-muted"></p>
      <img id="foto" src="" alt="Foto del artista" class="img-fluid">


    </div>
    
    <style>
      
    

    </style>
    
    

    <script>
      let t=1986;
      const c = 12;
      console.log(t)
      let p = {"titulo": "Llano en llamas", "autor":"Juan Rulfo"};
      console.log(p.autor)
      
      function triplicar (a){
        return 3*a;
      }

      let d =document.createElement("p");
      d.textContent="Hola";

      document.getElementById("encabezado").appendChild(d);

      d.setAttribute('style', 'color:red');

      async function obtenerJSON() {
        const respuesta = await fetch('archivo.json');
        const datos = await respuesta.json();
        console.log(datos);
        let d2 = document.createElement("p");

        let texto = datos.autor;
        d2.textContent = texto;
        document.getElementById("encabezado").appendChild(d2);
        d2.setAttribute("style", "color:black")


      }
      


      async function obtenerServidor() {
        const respuesta = await fetch('http://openlibrary.org/subjects/love.json?published_in=1500-1600');
        const datos = await respuesta.json();
        console.log(datos);
        let d2 = document.createElement("p");

        let texto = datos.works[0].title;
        d2.textContent = texto;
        document.getElementById("encabezado").appendChild(d2);
        d2.setAttribute("style", "color:blue")
      }

      async function obtenerCantante(src){
        const respuesta = await fetch(src);
        const datos = await respuesta.json();
        console.log(datos);

        let name = datos.artists[0].strArtist;
        let bibio = datos.artists[0].strBiography;
        let link = datos.artists[0].strArtistThumb;

        console.log(link);
      

        let nombre = document.getElementById("nombre");
        let bibiogra = document.getElementById("bibio");
        let foto = document.getElementById("foto");
        

        nombre.textContent = name;
        bibiogra.textContent = bibio;
        foto.setAttribute("src", link);
      }

      //let button = document.createElement("button");
      //document.getElementById("encabezado").appendChild(button);
      //button.addEventListener("click", obtenerServidor);
      let src = "https://www.theaudiodb.com/api/v1/json/2/search.php?s=Coldplay";
      let src2 = "https://www.theaudiodb.com/api/v1/json/123/search.php?s=blackpink";
      let button1 = document.getElementById("artista1");
      let button2 = document.getElementById("artista2");

      button1.addEventListener("click", obtenerCantante.bind(null, src));

      button2.addEventListener("click", obtenerCantante.bind(null, src2));


      
    </script>

    <script src="https://code.jquery.com/jquery-3.4.1.slim.min.js" integrity="sha384-J6qa4849blE2+poT4WnyKhv5vZF5SrPo0iEjwBvKU7imGFAV0wwj1yYfoRSJoZ+n" crossorigin="anonymous"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.4.1/dist/js/bootstrap.min.js" integrity="sha384-wfSDF2E50Y2D1uUdj0O3uMBJnjuUD4Ih7YwaYd1iqfktj0Uod8GCExl3Og8ifwB6" crossorigin="anonymous"></script>
